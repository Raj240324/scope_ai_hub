name: System Health Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping:
    name: Ping Health Endpoint
    runs-on: ubuntu-latest
    env:
      ALERT: 'false'

    steps:
      - name: Call Health Endpoint
        run: |
          echo "Checking system health..."

          RESPONSE=$(curl -s --max-time 15 -H "Authorization: Bearer ${{ secrets.HEALTH_CHECK_TOKEN }}" "${{ secrets.SITE_URL }}/api/health" || echo '{"status":"down","services":{"note":"site unreachable"}}')

          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | grep -q '"status":"ok"'; then
            echo "System healthy"
            echo "ALERT=false" >> $GITHUB_ENV
          else
            echo "System degraded or unreachable"
            echo "ALERT=true" >> $GITHUB_ENV
          fi

      - name: Send Email Alert
        if: env.ALERT == 'true'
        run: |
          echo "Sending alert email..."

          curl -X POST https://api.brevo.com/v3/smtp/email \
          -H "accept: application/json" \
          -H "api-key: ${{ secrets.BREVO_API_KEY }}" \
          -H "content-type: application/json" \
          -d "{
            \"sender\": {
              \"name\": \"Scope AI Hub Monitor\",
              \"email\": \"infoscopeaihub@gmail.com\"
            },
            \"to\": [{
              \"email\": \"${{ secrets.ALERT_EMAIL }}\"
            }],
            \"subject\": \"🚨 Scope AI Hub System Alert\",
            \"htmlContent\": \"<h2>System Health Alert</h2><p>The system health check has failed. The platform may be degraded or unreachable.</p><p>Check immediately: <a href='${{ secrets.SITE_URL }}/api/health'>${{ secrets.SITE_URL }}/api/health</a></p>\"
          }"
