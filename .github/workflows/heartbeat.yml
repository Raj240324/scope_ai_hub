name: System Health Monitor

on:
  schedule:
    - cron: "0 9 */5 * *"   # every 5 days
  workflow_dispatch:

jobs:
  ping:
    name: Ping Health Endpoint
    runs-on: ubuntu-latest

    steps:

      - name: Call Health Endpoint
        id: health
        run: |
          echo "Checking system health..."

          RESPONSE=$(curl -s ${{ secrets.SITE_URL }}/api/health)

          echo "Response: $RESPONSE"

          STATUS=$(echo $RESPONSE | jq -r '.status')

          if [ "$STATUS" != "ok" ]; then
            echo "ALERT=true" >> $GITHUB_ENV
          else
            echo "ALERT=false" >> $GITHUB_ENV
          fi

      - name: Send Email Alert
        if: env.ALERT == 'true'
        run: |
          echo "Sending alert email..."

          curl -X POST https://api.brevo.com/v3/smtp/email \
          -H "accept: application/json" \
          -H "api-key: ${{ secrets.BREVO_API_KEY }}" \
          -H "content-type: application/json" \
          -d '{
            "sender": {
              "name": "Scope AI Hub Monitor",
              "email": "monitor@scopeaihub.com"
            },
            "to": [{
              "email": "${{ secrets.ALERT_EMAIL }}"
            }],
            "subject": "🚨 Scope AI Hub System Alert",
            "htmlContent": "<h2>System Health Alert</h2><p>The system health endpoint returned a degraded status.</p><p>Please check the system immediately.</p>"
          }'