# ============================================================
# KEEP ACTIVE: Prevents Supabase Free Tier from pausing
# Runs every 30 minutes — do not disable
# ============================================================

name: Supabase Heartbeat

on:
  schedule:
    - cron: "*/30 * * * *"  # Every 30 minutes
  workflow_dispatch:         # Allow manual trigger

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase via Health API (Authenticated)
        run: |
          echo "🔄 Sending keep-alive request..."

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: Bearer ${{ secrets.HEALTH_CHECK_TOKEN }}" \
          https://scope-ai-hub.vercel.app/api/health)

          echo "📡 Response status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "❌ Heartbeat failed — Supabase may go idle"
            exit 1
          fi

          echo "✅ Heartbeat successful — Supabase is active"